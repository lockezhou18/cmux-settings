# ============================================
# Prefix Key: Ctrl-a (easier to reach on Mac)
# ============================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================
# General Settings
# ============================================
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g status-style bg=blue,fg=white

# ============================================
# Pane Splitting (| and -)
# ============================================
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# ============================================
# Pane Navigation (arrow keys)
# ============================================
bind Up select-pane -U
bind Down select-pane -D
bind Left select-pane -L
bind Right select-pane -R

# ============================================
# Pane Resizing (Shift vim keys)
# ============================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# Reload Config
# ============================================
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ============================================
# Clipboard & Copy Mode (macOS)
# ============================================
set -g set-clipboard on
set -s copy-command 'pbcopy'

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'

# Paste from system clipboard (prefix + p)
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Double-click to select and copy word
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel 'pbcopy'
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-and-cancel 'pbcopy'

# ============================================
# Notifications
# ============================================
setw -g monitor-activity on
set -g visual-activity on
setw -g monitor-bell on
set -g visual-bell on
